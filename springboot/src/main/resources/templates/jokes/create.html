<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>New joke</title>
</head>
<body>
  <nav>
    <a href="/">Home</a> &gt; <a href="/jokes">Jokes</a> &gt; New
  </nav>

  <h1>New joke</h1>

  <div>
    Joke from
    <a th:href="@{/jokes/new(source=${T(com.skydev.jokesmvc.joke.JokeSource).OPENAI})}">openai</a>
    or
    <a th:href="@{/jokes/new(source=${T(com.skydev.jokesmvc.joke.JokeSource).ICANHAZDADJOKE})}">icanhazdadjoke</a>
  </div>

  <br/>

  <form action="/jokes/new" th:object="${jokeForm}" method="post">
    <div>
      <div>
        <label for="source">Source</label>
      </div>
      <input id="source" type="text" th:value="*{source.getValue()}" readonly disabled>
    </div>
    <div>
      <div>
        <label for="content">Joke</label>
      </div>
      <textarea id="content" th:field="*{content}" rows="4" cols="60"></textarea>
    </div>
    <div>
      <button type="submit">Save</button>
      <a th:href="@{/jokes/new(source=*{source})}" class="nes-btn">Another one</a>
    </div>
  </form>
</body>
</html>
